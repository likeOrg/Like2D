name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
      - uses: pnpm/action-setup@v3
        with:
          version: 9
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Typecheck
        run: pnpm --filter like2d typecheck
      
      - name: Build
        run: pnpm --filter like2d build
      
      - name: Run tests
        run: pnpm --filter like2d test
      
      - name: Publish to NPM
        run: |
          npm install -g npm@latest
          npm publish --provenance --access public
        working-directory: like
      
      - name: Publish to JSR
        run: npx jsr publish
        working-directory: like
