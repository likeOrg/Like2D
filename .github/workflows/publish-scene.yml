name: Publish Scene

on:
  push:
    tags:
      - 'scene-*'

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Typecheck
        run: pnpm --filter @like2d/scene typecheck

      - name: Build
        run: pnpm --filter @like2d/scene build

      - name: Publish to NPM
        run: npm publish --provenance --access public
        working-directory: like-scene

      - name: Publish to JSR
        run: npx jsr publish
        working-directory: like-scene
