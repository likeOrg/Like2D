<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Like2D - Demo</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #222;
      color: #fff;
      font-family: sans-serif;
      gap: 30px;
    }
    .demo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      border: 2px solid #444;
      padding: 20px;
      border-radius: 8px;
    }
    .demo-label {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .scene-label { color: #2196F3; }
    .love-label { color: #E91E63; }
    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      position: relative;
      width: 800px;
      height: 600px;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 4px;
      background: #4CAF50;
      color: white;
    }
    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>
  <div class="demo-section">
    <div class="demo-label scene-label">Scene Pattern</div>
    <button id="scene-fullscreen">Fullscreen</button>
    <div id="scene-container" class="game-container"></div>
  </div>

  <div class="demo-section">
    <div class="demo-label love-label">Love2D Pattern</div>
    <button id="love-fullscreen">Fullscreen</button>
    <div id="love-container" class="game-container"></div>
  </div>

  <script type="module" src="./src/main.ts"></script>
  <script type="module" src="./src/love-demo.ts"></script>
</body>
</html>
